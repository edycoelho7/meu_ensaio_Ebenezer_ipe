<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixer de Ensaio</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --primary: #bb86fc;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --success: #03dac6;
            --danger: #cf6679;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-color);
            padding: 30px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Menu de Seleção de Música */
        .song-selector {
            width: 100%;
            padding: 12px;
            margin-bottom: 30px;
            background-color: #2c2c2c;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        /* Botão Play/Pause Central */
        .play-btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
            transition: transform 0.1s, background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            background-color: var(--danger);
            color: white;
        }

        /* Controles de Faixas (Mute) */
        .track-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c2c2c;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .track-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .track-status {
            font-size: 0.8rem;
            color: var(--success);
        }

        .track-status.muted {
            color: var(--danger);
        }

        /* Switch (Botão de Alternância) */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--danger);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--success);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }
        
        #loading-msg {
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ensaio Mixer</h1>
        <p class="subtitle">Selecione a música e controle as faixas</p>

        <select id="seletor-musica" class="song-selector">
            </select>

        <p id="loading-msg">Carregando áudios...</p>

        <button class="play-btn" id="btn-play">PLAY</button>

        <div class="track-control">
            <div class="track-info">
                <span class="track-name">Voz</span>
                <span class="track-status" id="status-voz">Ligado</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-voz" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="track-control">
            <div class="track-info">
                <span class="track-name">Metrônomo</span>
                <span class="track-status" id="status-metronomo">Ligado</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-metronomo" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <audio id="audio-base" preload="auto"></audio>
    <audio id="audio-voz" preload="auto"></audio>
    <audio id="audio-metronomo" preload="auto"></audio>

    <script>
        // --- AQUI FICA O SEU REPERTÓRIO ---
        // Para adicionar mais, basta copiar um bloco { ... } e colar embaixo.
        const playlist = [
            {
                nome: "meu maior amor - nivea soares",
                base: "meu maior amor - nivea soares/base.mp3",
                voz: "meu maior amor - nivea soares/voz.mp3",
                metronomo: "meu maior amor - nivea soares/metronomo.mp3"
            },
            {
                nome: "Música 2 (Outra Música)",
                base: "musica2/base.mp3",
                voz: "musica2/voz.mp3",
                metronomo: "musica2/metronomo.mp3"
            },
            {
                nome: "Música 3 (Mais Uma)",
                base: "musica3/base.mp3",
                voz: "musica3/voz.mp3",
                metronomo: "musica3/metronomo.mp3"
            }
        ];

        const audioBase = document.getElementById('audio-base');
        const audioVoz = document.getElementById('audio-voz');
        const audioMetronomo = document.getElementById('audio-metronomo');
        
        const btnPlay = document.getElementById('btn-play');
        const toggleVoz = document.getElementById('toggle-voz');
        const toggleMetronomo = document.getElementById('toggle-metronomo');
        const seletorMusica = document.getElementById('seletor-musica');
        
        const statusVoz = document.getElementById('status-voz');
        const statusMetronomo = document.getElementById('status-metronomo');
        const loadingMsg = document.getElementById('loading-msg');

        let isPlaying = false;

        // Função para preencher o menu com as músicas da playlist
        function carregarMenu() {
            playlist.forEach((musica, index) => {
                const opcao = document.createElement('option');
                opcao.value = index;
                opcao.textContent = musica.nome;
                seletorMusica.appendChild(opcao);
            });
            
            // Carrega a primeira música ao abrir o app
            trocarMusica(0);
        }

        // Função para trocar os arquivos de áudio quando escolhe no menu
        function trocarMusica(index) {
            // Pausa se estiver tocando
            if (isPlaying) {
                pauseAll();
                isPlaying = false;
                btnPlay.textContent = 'PLAY';
                btnPlay.classList.remove('playing');
            }

            const musicaEscolhida = playlist[index];
            audioBase.src = musicaEscolhida.base;
            audioVoz.src = musicaEscolhida.voz;
            audioMetronomo.src = musicaEscolhida.metronomo;
        }

        // Evento: Quando o usuário muda a música no menu
        seletorMusica.addEventListener('change', (e) => {
            trocarMusica(e.target.value);
        });

        // Função para pausar todos
        function pauseAll() {
            audioBase.pause();
            audioVoz.pause();
            audioMetronomo.pause();
        }

        // Controle do botão Play/Pause
        btnPlay.addEventListener('click', () => {
            if (isPlaying) {
                pauseAll();
                btnPlay.textContent = 'PLAY';
                btnPlay.classList.remove('playing');
            } else {
                loadingMsg.style.display = 'block'; 
                
                Promise.all([
                    audioBase.play(),
                    audioVoz.play(),
                    audioMetronomo.play()
                ]).then(() => {
                    loadingMsg.style.display = 'none';
                    btnPlay.textContent = 'PAUSE';
                    btnPlay.classList.add('playing');
                    
                    const syncTime = audioBase.currentTime;
                    audioVoz.currentTime = syncTime;
                    audioMetronomo.currentTime = syncTime;
                }).catch(error => {
                    console.log("Erro ao reproduzir:", error);
                    loadingMsg.textContent = "Toque novamente para iniciar.";
                });
            }
            isPlaying = !isPlaying;
        });

        // Controle de Mute Voz
        toggleVoz.addEventListener('change', (e) => {
            if (e.target.checked) {
                audioVoz.muted = false;
                statusVoz.textContent = 'Ligado';
                statusVoz.classList.remove('muted');
            } else {
                audioVoz.muted = true;
                statusVoz.textContent = 'Mutado';
                statusVoz.classList.add('muted');
            }
        });

        // Controle de Mute Metrônomo
        toggleMetronomo.addEventListener('change', (e) => {
            if (e.target.checked) {
                audioMetronomo.muted = false;
                statusMetronomo.textContent = 'Ligado';
                statusMetronomo.classList.remove('muted');
            } else {
                audioMetronomo.muted = true;
                statusMetronomo.textContent = 'Mutado';
                statusMetronomo.classList.add('muted');
            }
        });

        audioBase.addEventListener('ended', () => {
            isPlaying = false;
            btnPlay.textContent = 'PLAY';
            btnPlay.classList.remove('playing');
            pauseAll();
            audioBase.currentTime = 0;
        });

        // Inicia o app preenchendo o menu
        carregarMenu();
    </script>
</body>
</html>
